<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLB Thể thao Điện tử</title>
    <link rel="icon" href="logo-itec.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1120;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 75%), 
                              linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* ===== CSS: VIỀN VÀ GLOW CHẠY VÒNG QUANH ===== */
        
        /* 1. Khai báo biến CSS để tạo animation góc quay */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; /* Bắt buộc để viền bám theo khung */
        }

        /* 2. Cấu hình chung cho cả Viền (before) và Glow (after) */
        .glass-panel::before,
        .glass-panel::after {
            content: "";
            position: absolute;
            inset: -3px; /* Độ dày của viền (kéo ra ngoài 2px) */
            border-radius: 1.5rem; /* Khớp với class rounded-3xl */
            /* Sử dụng conic-gradient và biến --angle để xoay vòng */
            background: conic-gradient(
                from var(--angle), 
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000
            );
            animation: spinAngle 3s linear infinite;
            
            /* Dùng Mask để khoét rỗng phần ruột, ngăn màu lẹm vào giữa panel */
            padding: 2px;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            
            pointer-events: none;
        }

        /* 3. Lớp Viền cứng */
        .glass-panel::before {
            z-index: -1;
        }

        /* 4. Lớp Glow (tỏa sáng) */
        .glass-panel::after {
            z-index: -2;
            filter: blur(5px); /* Làm nhòe mạnh để hắt sáng ra ngoài */
            opacity: 0.8;
        }

        @keyframes spinAngle {
            0% { --angle: 0deg; }
            100% { --angle: 360deg; }
        }
        /* =================================================== */

        .glow-button {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .glow-button::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #f6b53b, #fe4b4b, #3bf641);
            z-index: -1;
            filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glow-button:hover::before {
            opacity: 1;
        }

        .glow-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }

        body.no-scroll {
            overflow: hidden;
        }

        .form-input {
            width: 100%;
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
            background-color: rgba(15, 23, 42, 0.9);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.25rem;
            height: 1.25rem;
            color: #94a3b8;
        }

        /* ===== CSS CHO TOAST NOTIFICATION ===== */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }
        .toast-enter {
            animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .toast-exit {
            animation: fadeOut 0.3s ease-in forwards;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center relative overflow-hidden p-4">

    <!-- Ánh sáng nền -->
    <div class="absolute top-[10%] left-[20%] w-72 h-72 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20"></div>
    <div class="absolute bottom-[10%] right-[20%] w-80 h-80 bg-purple-600 rounded-full mix-blend-screen filter blur-[120px] opacity-20"></div>

    <!-- ===== CONTAINER CHỨA TOAST ===== -->
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>

    <!-- Container Chính -->
    <main id="bait-ui" class="glass-panel p-8 md:p-10 rounded-3xl max-w-lg w-full z-10">
        
        <!-- Header -->
        <div class="text-center mb-10 pb-6 border-b border-slate-700/50">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-indigo-500/10 flex items-center justify-center border border-indigo-500/30 mb-4 shadow-inner overflow-hidden p-1">
            <img 
                src="logo-itec.png" 
                alt="Logo CLB" 
                class="w-full h-full object-contain drop-shadow-md"
            >
        </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">CLB THỂ THAO ĐIỆN TỬ</h1>
            <p class="text-sm text-slate-400 font-medium">Cổng thông tin thành viên nội bộ</p>
        </div>

        <!-- ===== GIAO DIỆN ĐĂNG NHẬP ===== -->
        <div id="login-section">
            <h2 class="text-xl font-bold text-center text-white mb-6">Đăng nhập tài khoản</h2>
            
            <form id="real-login-form" class="space-y-4" onsubmit="return false;">
                <div class="relative">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <input type="text" id="login-user" class="form-input" placeholder="Tên đăng nhập hoặc Email" required>
                </div>
                <div class="relative">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <input type="password" id="login-pass" class="form-input" placeholder="Mật khẩu" required>
                </div>
                
                <div class="flex items-center justify-between text-sm text-slate-400 pt-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="accent-indigo-500 rounded border-slate-700 bg-slate-800"> Ghi nhớ
                    </label>
                    <a href="#" class="hover:text-white transition-colors">Quên mật khẩu?</a>
                </div>

                <button id="login-trigger-btn" class="glow-button w-full mt-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 px-8 rounded-xl flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                    Đăng Nhập
                </button>
            </form>

            <p class="text-center text-sm text-slate-400 mt-8">
                Chưa có tài khoản thành viên?
                <a href="#" id="go-to-register" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Đăng ký tại đây</a>
            </p>
        </div>

        <!-- ===== GIAO DIỆN ĐĂNG KÝ ===== -->
        <div id="register-section" class="hidden">
            <h2 class="text-xl font-bold text-center text-white mb-6">Đăng ký tài khoản</h2>
            
            <form id="real-register-form" class="space-y-4" onsubmit="return false;">
                <div class="relative">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 012-2h2a2 2 0 012 2v1m-4 0a2 2 0 012 2v2M7 7h10"></path></svg>
                    <input type="text" class="form-input" placeholder="Nhập họ và tên của bạn..." required>
                </div>
                <div class="relative">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <input type="email" class="form-input" placeholder="ĐNhập email của bạn..." required>
                </div>
                <div class="relative">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <input type="password" class="form-input" placeholder="Mật khẩu bảo mật" required>
                </div>

                <button id="register-btn" class="glow-button w-full mt-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 px-8 rounded-xl flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                    Đăng Ký
                </button>
            </form>
            
            <p class="text-center text-sm text-slate-400 mt-8">
                Đã có tài khoản?
                <a href="#" id="go-to-login" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Quay về Đăng nhập</a>
            </p>
        </div>

    </main>

    <!-- Container chứa Video ẩn -->
    <div id="video-container" class="fixed inset-0 z-50 hidden bg-black flex items-center justify-center">
        <!-- Đảm bảo tên file video chính xác tại đây -->
        <video id="troll-video" class="w-full h-full object-contain pointer-events-none" src="trollRR.mp4"></video>
    </div>

    <script>
        const baitUI = document.getElementById('bait-ui');
        const loginSection = document.getElementById('login-section');
        const registerSection = document.getElementById('register-section');
        const loginForm = document.getElementById('real-login-form');
        const registerForm = document.getElementById('real-register-form');

        const loginTriggerBtn = document.getElementById('login-trigger-btn');
        const goToRegisterLink = document.getElementById('go-to-register');
        const goToLoginLink = document.getElementById('go-to-login');

        const videoContainer = document.getElementById('video-container');
        const trollVideo = document.getElementById('troll-video');
        
        // HÀM TẠO TOAST THÔNG BÁO
        function showToast(message) {
            const container = document.getElementById('toast-container');
            
            // Tạo element div cho Toast
            const toast = document.createElement('div');
            // Gắn class css và tailwind
            toast.className = 'toast-enter glass-panel border-l-4 border-emerald-500 text-white px-5 py-4 rounded-lg shadow-2xl flex items-center gap-3 min-w-[300px] bg-slate-800/90';
            
            // Nội dung Toast (Icon check xanh lá + Text)
            toast.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div class="flex-1 text-sm font-semibold">${message}</div>
            `;
            
            // Đẩy Toast vào container
            container.appendChild(toast);

            // Tự động ẩn sau 3.5 giây
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                // Xóa hẳn khỏi HTML sau khi hiệu ứng mờ dần kết thúc
                setTimeout(() => toast.remove(), 300); 
            }, 3500);
        }

        // Logic chuyển màn hình
        function showLogin() {
            loginSection.classList.remove('hidden');
            registerSection.classList.add('hidden');
        }

        function showRegister() {
            loginSection.classList.add('hidden');
            registerSection.classList.remove('hidden');
        }

        goToRegisterLink.addEventListener('click', (e) => { e.preventDefault(); showRegister(); });
        goToLoginLink.addEventListener('click', (e) => { e.preventDefault(); showLogin(); });

        // Logic 1: Xử lý Đăng ký giả thành công
        registerForm.addEventListener('submit', () => {
            // Gọi hàm Toast thay vì alert
            showToast("Đăng ký thành công! Đang chuyển hướng...");
            registerForm.reset();
            
            // Đợi 1.5 giây để người dùng đọc thông báo rồi mới chuyển form
            setTimeout(() => {
                showLogin();
            }, 1500);
        });

        // Logic 2: Xử lý Đăng nhập (Kích hoạt Troll)
        loginForm.addEventListener('submit', () => {
            loginTriggerBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Đang xác thực thông tin...`;
            loginTriggerBtn.disabled = true;

            setTimeout(async () => {
                baitUI.classList.add('hidden');
                videoContainer.classList.remove('hidden');
                document.body.classList.add('no-scroll');

                try {
                    if (videoContainer.requestFullscreen) {
                        await videoContainer.requestFullscreen();
                    } else if (videoContainer.webkitRequestFullscreen) {
                        await videoContainer.webkitRequestFullscreen();
                    } else if (videoContainer.msRequestFullscreen) {
                        await videoContainer.msRequestFullscreen();
                    }
                } catch (err) {
                    console.log("Browser denied fullscreen API, falling back to full-window mode.");
                }

                trollVideo.play();
                
                loginTriggerBtn.disabled = false;
                loginTriggerBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg> Đăng Nhập Ngay`;
                loginForm.reset();
            }, 1200);
        });

        // Xử lý tự động thoát khi video kết thúc
        trollVideo.addEventListener('ended', () => {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(err => console.log(err));
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }

            videoContainer.classList.add('hidden');
            baitUI.classList.remove('hidden');
            document.body.classList.remove('no-scroll');
        });
    </script>
</body>
</html>
